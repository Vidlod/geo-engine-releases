appId: com.geo-engine.desktop
productName: GEO Engine
copyright: Copyright © 2026 GEO Engine

publish:
  provider: github
  owner: Vidlod
  repo: geo-engine-releases   # Apunta al repositorio público de releases
  # release (no draft): los borradores son invisibles para electron-updater,
  # por eso el aviso de actualización nunca llegaba a la app.
  releaseType: release

directories:
  output: release

files:
  - "main.js"
  - "preload.js"
  - "menu.js"
  - "server/**/*"
  - "!server/convert_pdf.py"
  - "!server/convert_xlsx.py"
  - "node_modules/**/*"
  - "package.json"

# El Agent SDK es ESM y trae un binario nativo (`claude`) que se ejecuta como
# proceso. Ni el `import()` de ESM ni la ejecución de binarios funcionan desde
# dentro de app.asar, así que estos paquetes se desempaquetan a app.asar.unpacked.
asarUnpack:
  - "node_modules/@anthropic-ai/claude-agent-sdk/**"
  - "node_modules/@anthropic-ai/claude-agent-sdk-*/**"

extraResources:
  - from: "../web/dist"
    to: "web-dist"
    filter:
      - "**/*"
  - from: "../skills"
    to: "skills"
    filter:
      - "**/*"
      - "!build.py"
      - "!install.py"
  - from: "server/convert_pdf.py"
    to: "scripts/convert_pdf.py"
  - from: "server/convert_xlsx.py"
    to: "scripts/convert_xlsx.py"

mac:
  category: public.app-category.developer-tools
  target:
    # electron-updater en macOS REQUIERE el target zip (el dmg es solo
    # para la instalación manual; la actualización se descarga del zip).
    - target: zip
      arch:
        - x64
    - target: dmg
      arch:
        - x64
  darkModeSupport: true
  icon: assets/icon.png
  extraResources:
    - from: "pandoc-bin/darwin"
      to: "pandoc"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png
  extraResources:
    - from: "pandoc-bin/win32"
      to: "pandoc"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

dmg:
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
